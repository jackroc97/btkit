# Exit condition test — very tight take_profit to force TP exits.
# Used in Test 4 (SC-4): expected exit_reason = 'take_profit'.

strategy:
  name: exit_tp_test
  version: "1.0"

  universe:
    start_date: "2026-04-22"
    end_date:   "2026-05-21"
    session:
      timezone:      "America/New_York"
      start_time:    "09:30"
      end_time:      "16:00"
      weekdays_only: true
      skip_dates:    []

  costs:
    slippage_pct:     0.0
    fee_per_contract: 0.0

  trades:
    - name: short_put_spread
      instrument:
        root_symbol: ES
        asset_class: future

      entry:
        window:
          start: "10:00"
          end:   "12:00"
        conditions: []

      legs:
        - name: short_put
          right:    put
          action:   sell_to_open
          delta:
            target:    -0.25
          dte:      21
          quantity: 1

        - name: long_put
          right:    put
          action:   buy_to_open
          delta:
            target:    -0.15
          dte:      21
          quantity: 1

      exit:
        stop_loss:   999.00   # effectively disabled
        take_profit: 0.05     # very tight — triggers almost immediately
        dte_exit:    null
        expiry_exit: false
        conditions:  []
