# Iron condor — four-leg strategy for multi-leg correctness testing.
# Used in Test 3 (see docs/mvp.md).

strategy:
  name: iron_condor_test
  version: "1.0"

  instrument:
    root_symbol: ES
    asset_class: future

  universe:
    start_date: "2023-01-03"
    end_date:   "2023-03-31"
    session:
      timezone:      "America/New_York"
      start_time:    "09:30"
      end_time:      "16:00"
      weekdays_only: true
      skip_dates:    []

  entry:
    window:
      start: "10:00"
      end:   "11:00"
    max_open_positions: 1
    conditions: []

  legs:
    - name: long_put
      right:    put
      action:   buy_to_open
      delta:    -0.10
      dte:      45
      quantity: 1

    - name: short_put
      right:    put
      action:   sell_to_open
      delta:    -0.20
      dte:      45
      quantity: 1

    - name: short_call
      right:    call
      action:   sell_to_open
      delta:    0.20
      dte:      45
      quantity: 1

    - name: long_call
      right:    call
      action:   buy_to_open
      delta:    0.10
      dte:      45
      quantity: 1

  exit:
    stop_loss:   3.00
    take_profit: 0.50
    dte_exit:    21
    expiry_exit: true
    conditions:  []

  sizing:
    contracts: 1

  costs:
    slippage_pct:     0.01
    fee_per_contract: 0.65
