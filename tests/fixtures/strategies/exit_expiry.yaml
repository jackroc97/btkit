# Exit condition test — expiry_exit only; all other exits disabled.
# Positions must be held through to expiration.
# Used in Test 4 (SC-4): expected exit_reason = 'expiry'.

strategy:
  name: exit_expiry_test
  version: "1.0"

  universe:
    start_date: "2026-04-22"
    end_date:   "2026-05-21"
    session:
      timezone:      "America/New_York"
      start_time:    "09:30"
      end_time:      "16:00"
      weekdays_only: true
      skip_dates:    []

  costs:
    slippage_pct:     0.0
    fee_per_contract: 0.0

  trades:
    - name: short_put_spread
      instrument:
        root_symbol: ES
        asset_class: future

      entry:
        window:
          start: "10:00"
          end:   "11:00"
        conditions: []

      legs:
        - name: short_put
          right:    put
          action:   sell_to_open
          delta:    -0.25
          dte:      14
          quantity: 1

        - name: long_put
          right:    put
          action:   buy_to_open
          delta:    -0.15
          dte:      14
          quantity: 1

      exit:
        stop_loss:   999.00  # disabled
        take_profit: 999.00  # disabled
        dte_exit:    null    # disabled
        expiry_exit: true
        conditions:  []
