# Indicator entry condition test — golden cross filter (SC-5).
# sma_5 > sma_20 is true during uptrends, filtering a portion of entry signals.
# Used in Test 5: entry count should be less than the no-condition baseline.

strategy:
  name: indicator_conditions_test
  version: "1.0"

  universe:
    start_date: "2026-04-22"
    end_date:   "2026-05-21"
    session:
      timezone:      "America/New_York"
      start_time:    "09:30"
      end_time:      "16:00"
      weekdays_only: true
      skip_dates:    []

  costs:
    slippage_pct:     0.01
    fee_per_contract: 0.65

  trades:
    - name: short_put_spread
      instrument:
        root_symbol: ES
        asset_class: future

      entry:
        window:
          start: "10:00"
          end:   "12:00"
        conditions:
          - "sma_5 > sma_20"   # selective condition — filters a portion of entries

      legs:
        - name: short_put
          right:    put
          action:   sell_to_open
          delta:
            target:    -0.25
          dte:      21
          quantity: 1

        - name: long_put
          right:    put
          action:   buy_to_open
          delta:
            target:    -0.15
          dte:      21
          quantity: 1

      exit:
        stop_loss:   2.00
        take_profit: 0.50
        dte_exit:    7
        expiry_exit: true
        conditions:  []
