# Exit condition test — indicator exit that is always true after warmup.
# sma_5 > 0 is true for any positive price series; positions should close
# on the first bar after entry where sma_5 is available (bar 5+).
# Used in Test 4 (SC-4): expected exit_reason = 'condition'.

strategy:
  name: exit_condition_test
  version: "1.0"

  universe:
    start_date: "2026-04-22"
    end_date:   "2026-05-21"
    session:
      timezone:      "America/New_York"
      start_time:    "09:30"
      end_time:      "16:00"
      weekdays_only: true
      skip_dates:    []

  costs:
    slippage_pct:     0.0
    fee_per_contract: 0.0

  trades:
    - name: short_put_spread
      instrument:
        root_symbol: ES
        asset_class: future

      entry:
        window:
          start: "10:00"
          end:   "12:00"
        conditions: []

      legs:
        - name: short_put
          right:    put
          action:   sell_to_open
          delta:    -0.25
          dte:      21
          quantity: 1

        - name: long_put
          right:    put
          action:   buy_to_open
          delta:    -0.15
          dte:      21
          quantity: 1

      exit:
        stop_loss:   999.00  # disabled
        take_profit: 999.00  # disabled
        dte_exit:    null
        expiry_exit: false
        conditions:
          - "sma_5 > 0"     # always true after warmup — forces condition exit
